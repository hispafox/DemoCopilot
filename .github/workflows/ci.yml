name: Integración Continua

permissions:
  contents: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restaurar dependencias
      run: dotnet restore
    
    - name: Compilar proyecto
      run: dotnet build --no-restore --configuration Release
    
    - name: Ejecutar tests con cobertura
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

    - name: Instalar ReportGenerator
      run: dotnet tool install --tool-path ./.tools dotnet-reportgenerator-globaltool

    - name: Generar informe HTML de cobertura
      run: ./.tools/reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:HtmlSummary

    - name: Subir resultados de tests y cobertura
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: |
          TestResults/
          coverage-report/
        retention-days: 7

    - name: Publicar informe de cobertura en rama dedicada
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./coverage-report
        publish_branch: coverage-reports
        allow_empty_commit: false
  
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Instalar dependencias
      run: npm ci
    
    - name: Ejecutar linter
      run: npm run lint
    
    - name: Compilar producción
      run: npm run build
    
    - name: Subir artefactos de build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
        retention-days: 7
